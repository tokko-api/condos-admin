version: "3.9"

services:
  # ===========================================
  # Traefik - API Gateway & Reverse Proxy
  # ===========================================
  traefik:
    image: traefik:v3.1
    container_name: condos-traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redirection HTTP → HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Dynamic configuration provider
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      # Let's Encrypt
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.le.acme.storage=/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./gateway/traefik_dynamic.yml:/etc/traefik/dynamic/traefik_dynamic.yml:Z
      - ./acme.json:/acme.json
    networks:
      - default

  # ===========================================
  # MongoDB - Database
  # ===========================================
  mongo:
    image: mongo:7
    container_name: ${PROJECT_NAME:-condos}-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-condos}
    volumes:
      - mongo_data:/data/db:Z
      - ./mongo-init:/docker-entrypoint-initdb.d:ro,Z
    networks:
      - default
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ===========================================
  # MinIO - Object Storage
  # ===========================================
  minio:
    image: quay.io/minio/minio:latest
    container_name: ${PROJECT_NAME:-condos}-attachments
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-dsfgsdfg34513}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-dsfgsdfg34513}
    volumes:
      - minio_data:/data
    networks:
      - default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # Auth API - Authentication Service
  # ===========================================
  auth-api:
    build: ./auth-api
    container_name: ${PROJECT_NAME:-condos}-auth-api
    restart: unless-stopped
    environment:
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI:?SPRING_DATA_MONGODB_URI is required}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-240}
    networks:
      - default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      mongo:
        condition: service_healthy

  # ===========================================
  # Tenant API - Multi-tenant Management
  # ===========================================
  tenant-api:
    build: ./tenant-api
    container_name: ${PROJECT_NAME:-condos}-tenant-api
    restart: unless-stopped
    environment:
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI:?SPRING_DATA_MONGODB_URI is required}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-240}
    networks:
      - default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      mongo:
        condition: service_healthy

  # ===========================================
  # User API - User Management
  # ===========================================
  user-api:
    build: ./user-api
    container_name: ${PROJECT_NAME:-condos}-user-api
    restart: unless-stopped
    environment:
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI:?SPRING_DATA_MONGODB_URI is required}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-240}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-change-me}
    networks:
      - default
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      mongo:
        condition: service_healthy

  # ===========================================
  # Board API - Task/Board Management
  # ===========================================
  board-api:
    build: ./board-api
    container_name: ${PROJECT_NAME:-condos}-board-api
    restart: unless-stopped
    environment:
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI:?SPRING_DATA_MONGODB_URI is required}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-240}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    networks:
      - default
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ===========================================
  # Frontend (Optional - if serving static files)
  # ===========================================
  # frontend:
  #   image: nginx:alpine
  #   container_name: condos-frontend
  #   restart: unless-stopped
  #   volumes:
  #     - ./frontend/dist:/usr/share/nginx/html:ro
  #   networks:
  #     - default

# ===========================================
# Networks
# ===========================================
networks:
  default:
    name: ${NETWORK_NAME:-condos-admin-net}

# ===========================================
# Volumes (Named volumes for data persistence)
# ===========================================
volumes:
  mongo_data:
    driver: local
  minio_data:
    driver: local