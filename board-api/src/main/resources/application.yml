server:
  port: 8080

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  profiles:
    active: dev
  data:
    mongodb:
      uri: mongodb://***REMOVED***:***REMOVED***@mongo:27017/condos?authSource=condos
  main:
    allow-bean-definition-overriding: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    org.springframework: WARN
    org.springframework.security: WARN
    com.condos: DEBUG

user:
  api:
    # si usas el endpoint interno:
    base-url: http://user-api:8080/condos/api/user
    internal-path: /internal   #

app:
  errors:
    verbose: true
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-please-32bytes-minimum-secret-key!!}
      issuer: condos-auth
      expires-minutes: ${JWT_EXPIRES_MINUTES:240}

minio:
  endpoint: http://192.168.1.141:9000
  accessKey: ${MINIO_ACCESS_KEY:admin}
  secretKey: ${MINIO_SECRET_KEY:admin12345}
  bucket: condos-attachments
  region: us-east-1
  presignMinutes: 10

storage:
  bucket: condos-attachments
  # Host EXTERNO (el que verá el celular)
  externalEndpoint: https://minio.tudominio.com    # o http://192.168.1.50:9000
  region: us-east-1
  accessKey: admin
  secretKey: admin123
  expiresSeconds: 600