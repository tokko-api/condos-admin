server:
  port: 8080

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}
  main:
    allow-bean-definition-overriding: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    org.springframework: ${SPRING_LOG_LEVEL:WARN}
    org.springframework.security: ${SECURITY_LOG_LEVEL:WARN}
    com.condos: ${APP_LOG_LEVEL:DEBUG}

user:
  api:
    base-url: ${USER_API_URL:http://user-api:8080/condos/api/user}
    internal-path: /internal

app:
  errors:
    verbose: ${ERRORS_VERBOSE:false}
  security:
    jwt:
      secret: ${JWT_SECRET}
      issuer: condos-auth
      expires-minutes: ${JWT_EXPIRES_MINUTES:240}

# MinIO Object Storage Configuration
minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  accessKey: ${MINIO_ROOT_USER:minioadmin}
  secretKey: ${MINIO_ROOT_PASSWORD:minioadmin}
  bucket: ${MINIO_BUCKET:condos-attachments}
  region: ${MINIO_REGION:us-east-1}
  presignMinutes: ${MINIO_PRESIGN_MINUTES:10}

# Public API URLs (for generating public links)
public:
  api:
    base: ${PUBLIC_API_BASE:https://api.condosadmin.site}
  minio:
    base: ${PUBLIC_MINIO_BASE:https://api.condosadmin.site/minio}

# Storage Configuration
storage:
  bucket: ${MINIO_BUCKET:condos-attachments}
  externalEndpoint: ${PUBLIC_API_BASE:https://api.condosadmin.site}
  region: ${MINIO_REGION:us-east-1}
  accessKey: ${MINIO_ROOT_USER:minioadmin}
  secretKey: ${MINIO_ROOT_PASSWORD:minioadmin}
  expiresSeconds: ${STORAGE_PRESIGN_SECONDS:600}