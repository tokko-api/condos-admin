server:
  port: 8080

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}
  main:
    allow-bean-definition-overriding: true

springdoc:
  api-docs:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    org.springframework: ${SPRING_LOG_LEVEL:WARN}
    com.condos: ${APP_LOG_LEVEL:DEBUG}

app:
  errors:
    verbose: ${ERRORS_VERBOSE:false}
  security:
    jwt:
      secret: ${JWT_SECRET}
      issuer: condos-auth
      expires-minutes: ${JWT_EXPIRES_MINUTES:240}

internal:
  secret: ${INTERNAL_API_SECRET:change-me-in-production}

user:
  api:
    url: ${USER_API_URL:http://user-api:8080/condos/api/user}