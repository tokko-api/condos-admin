http:
  middlewares:
    # 🌐 CORS para Expo web (exp.direct)
    cors-allow-exp:
      headers:
        accessControlAllowOriginListRegex:
          - "^https://[a-z0-9-]+\\.exp\\.direct$"
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - Authorization
          - Content-Type
          - Accept
          - Origin
          - X-Requested-With
          - ngrok-skip-browser-warning
        accessControlAllowCredentials: true
        accessControlMaxAge: 86400

    # 🌐 CORS para túneles ngrok (si los sigues usando)
    cors-allow-public:
      headers:
        accessControlAllowOriginListRegex:
          - "^https://[a-z0-9-]+\\.ngrok-free\\.app$"
        accessControlAllowMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        accessControlAllowHeaders:
          - Authorization
          - Content-Type
          - Accept
          - Origin
          - X-Requested-With
          - ngrok-skip-browser-warning
        accessControlAllowCredentials: true
        accessControlMaxAge: 86400

    # 🌐 CORS para localhost + TU DOMINIO
    cors-allow-local:
      headers:
        accessControlAllowOriginList:
          - "http://localhost:8081"
          - "http://localhost:3000"
          - "https://condosadmin.site"
          - "https://www.condosadmin.site"
          - "https://api.condosadmin.site"
        accessControlAllowMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        accessControlAllowHeaders:
          - Authorization
          - Content-Type
          - Accept
          - Origin
          - X-Requested-With
          - ngrok-skip-browser-warning
        accessControlAllowCredentials: true
        accessControlMaxAge: 86400

    # 🔗 Cadena que agrupa todos los CORS anteriores
    cors-chain:
      chain:
        middlewares:
          - cors-allow-exp
          - cors-allow-public
          - cors-allow-local

  routers:
    # ====== APIs (todas bajo api.condosadmin.site) ======
    r-auth:
      rule: "Host(`api.condosadmin.site`) && PathPrefix(`/condos/api/auth`)"
      service: s-auth
      entryPoints: ["websecure"]
      middlewares: ["cors-chain"]
      tls:
        certResolver: le

    r-tenant:
      rule: "Host(`api.condosadmin.site`) && (PathPrefix(`/condos/api/tenant`) || PathPrefix(`/condos/api/admin/tenant`))"
      service: s-tenant
      entryPoints: ["websecure"]
      middlewares: ["cors-chain"]
      tls:
        certResolver: le

    r-user:
      rule: "Host(`api.condosadmin.site`) && (PathPrefix(`/condos/api/user`) || PathPrefix(`/condos/api/admin/user`))"
      service: s-user
      entryPoints: ["websecure"]
      middlewares: ["cors-chain"]
      tls:
        certResolver: le

    r-user-internal:
      rule: "Host(`api.condosadmin.site`) && PathPrefix(`/internal/users`)"
      service: s-user
      entryPoints: ["websecure"]
      tls:
        certResolver: le

    r-board:
      rule: "Host(`api.condosadmin.site`) && (PathPrefix(`/condos/api/board`) || PathPrefix(`/condos/api/files`))"
      service: s-board
      entryPoints: ["websecure"]
      middlewares: ["cors-chain"]
      tls:
        certResolver: le

    r-auth-swagger:
      rule: "Host(`api.condosadmin.site`) && (PathPrefix(`/condos/api/auth/swagger-ui`) || PathPrefix(`/condos/api/auth/v3/api-docs`))"
      service: s-auth
      entryPoints: ["websecure"]
      middlewares: ["cors-chain"]
      tls:
        certResolver: le

    # Dashboard Traefik (opcional: puedes usar otro subdominio tipo traefik.condosadmin.site)
    r-dashboard:
      rule: "Host(`api.condosadmin.site`) && PathPrefix(`/dashboard`)"
      entryPoints: ["websecure"]
      service: "api@internal"
      tls:
        certResolver: le
      # si no tienes 'dash-auth' definido, quítalo o créalo
      # middlewares: ["dash-auth"]

  services:
    s-auth:
      loadBalancer:
        servers:
          - url: "http://auth-api:8080"
    s-tenant:
      loadBalancer:
        servers:
          - url: "http://tenant-api:8080"
    s-user:
      loadBalancer:
        servers:
          - url: "http://user-api:8080"
    s-board:
      loadBalancer:
        servers:
          - url: "http://board-api:8080"
    s-minio:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://minio:9000"